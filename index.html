<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>記念日カウント</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="phone-frame">
      <header class="top-hero">
        <button class="circle-btn" aria-label="メニュー">☰</button>
        <div class="hero-copy">
          <h1>記念日カウント</h1>
          <p>大切な日を、もっと特別に。</p>
        </div>
        <button class="circle-btn" aria-label="設定">⚙</button>
      </header>

      <main class="content">
        <section class="today-card card">
          <div>
            <p class="label">今日は</p>
            <p class="today-date">2026.04.30 <span class="weekday">木</span></p>
          </div>
          <button class="calendar-btn">🗓 カレンダー表示</button>
        </section>

        <section class="list-head-row">
          <h2>記念日一覧</h2>
          <button class="add-btn">＋ 記念日を追加</button>
        </section>

        <section class="anniversary-list">
          <article class="ann-card card">
            <div class="icon">♡</div>
            <div class="meta"><h3>付き合った日</h3><p>2025.03.02</p><span>ふたりの記念日</span></div>
            <div class="days"><strong>424</strong><small>日</small></div><div class="arrow">›</div>
          </article>
          <article class="ann-card card">
            <div class="icon">💍</div>
            <div class="meta"><h3>プロポーズ記念日</h3><p>2026.03.02</p><span>特別な日</span></div>
            <div class="days"><strong>33</strong><small>日</small></div><div class="arrow">›</div>
          </article>
          <article class="ann-card card">
            <div class="icon">✈</div>
            <div class="meta"><h3>初めての旅行</h3><p>2025.08.05</p><span>思い出</span></div>
            <div class="days"><strong>268</strong><small>日</small></div><div class="arrow">›</div>
          </article>
          <article class="ann-card card">
            <div class="icon">★</div>
            <div class="meta"><h3>出会って1000日</h3><p>2027.11.26</p><span>ふたりの記念日</span></div>
            <div class="days"><strong>あと575</strong><small>日</small></div><div class="arrow">›</div>
          </article>
        </section>
      </main>

      <nav class="bottom-nav">
        <button>ホーム</button>
        <button>一覧</button>
        <button class="center-add">＋<span>追加</span></button>
        <button>統計</button>
        <button>シェア</button>
      </nav>
    </div>
  </body>
</html>

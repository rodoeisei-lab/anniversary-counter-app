<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ふたりカウント</title>
    <meta name="description" content="毎日開きたくなる記念日カウントアプリ" />
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <div class="app">
      <header class="app-header card">
        <div>
          <p class="eyebrow">Daily Anniversary Companion</p>
          <h1>ふたりカウント</h1>
        </div>
        <button id="theme-toggle" class="icon-btn" type="button" aria-label="ダークモード切替">🌙</button>
      </header>

      <section id="onboarding" class="card onboarding hidden" aria-live="polite">
        <p class="eyebrow">はじめての方へ</p>
        <h2>まず1つだけ記念日を登録すると、毎日チェックできる画面になります。</h2>
        <ul>
          <li>今日の変化（昨日との差）</li>
          <li>次の節目と通知予定</li>
          <li>進行度の可視化</li>
        </ul>
        <button id="onboarding-close" class="btn" type="button">OK、はじめる</button>
      </section>

      <section class="card hero" id="hero-card">
        <p class="eyebrow">今日の状況</p>
        <p id="today-value" class="hero-days">--</p>
        <p id="today-caption" class="hero-caption">まずは記念日を登録してください。</p>
        <div class="delta-wrap" id="delta-badge">昨日との差分: --</div>
        <div class="hero-actions">
          <button id="share-main" class="btn" type="button">共有</button>
          <button id="download-main" class="btn secondary" type="button">画像保存</button>
          <button id="present-main" class="btn secondary" type="button">全画面</button>
        </div>
      </section>

      <section class="card summary-card">
        <div class="summary-head">
          <h2>今日の記念日サマリー</h2>
          <p id="checkin-stats" class="muted">連続チェック -- 日</p>
        </div>
        <div id="today-summary" class="summary-grid"></div>
      </section>

      <section class="card milestone-card">
        <h2>次の節目まで</h2>
        <div id="milestone-panel"></div>
      </section>

      <section class="card notify-card">
        <h2>通知予定（疑似通知）</h2>
        <div id="notify-list" class="notify-list"></div>
      </section>

      <section class="card form-card">
        <h2>記念日を追加 / 編集</h2>
        <form id="anniversary-form" class="form-grid">
          <input type="hidden" id="ann-id" />
          <label>
            タイトル
            <input id="ann-title" maxlength="40" placeholder="例: 付き合った日" required />
          </label>
          <label>
            日付
            <input id="ann-date" type="date" required />
            <small class="hint">間違えやすい場合はカレンダーから選択してください</small>
          </label>
          <label>
            特別メッセージ
            <textarea id="ann-message" rows="2" maxlength="120" placeholder="いつもありがとう"></textarea>
          </label>
          <label>
            テーマ
            <select id="ann-theme">
              <option value="simple">シンプル</option>
              <option value="romantic">ロマンチック</option>
              <option value="pop">ポップ</option>
            </select>
          </label>
          <p id="form-error" class="error"></p>
          <div class="form-actions">
            <button class="btn" type="submit">保存</button>
            <button id="cancel-edit" class="btn secondary" type="button">編集キャンセル</button>
          </div>
        </form>
      </section>


      <section class="card backup-card">
        <h2>バックアップ / 復元</h2>
        <p class="backup-note">機種変更前に保存しておくと安心です。</p>
        <p id="backup-last" class="muted">最終バックアップ: まだありません</p>
        <div class="backup-actions">
          <button id="backup-export" class="btn" type="button">バックアップ</button>
          <button id="backup-import" class="btn secondary" type="button">復元</button>
        </div>
        <input id="backup-file" type="file" accept="application/json,.json" class="hidden" />
      </section>
      <section class="card list-card">
        <div class="list-head">
          <h2>記念日カード</h2>
          <button id="sample-btn" class="btn secondary" type="button">サンプル再読込</button>
        </div>
        <div id="anniversary-list" class="anniversary-list"></div>
      </section>
    </div>

    <button id="floating-share" class="floating-share" type="button">📤 共有</button>

    <section id="present-mode" class="present-mode hidden" aria-label="カウントダウン専用表示">
      <article id="present-card" class="present-card"></article>
      <div class="present-actions">
        <button id="present-share" class="btn" type="button">共有</button>
        <button id="present-save" class="btn secondary" type="button">画像保存</button>
        <button id="present-close" class="btn secondary" type="button">閉じる</button>
      </div>
    </section>

    <canvas id="share-canvas" width="1080" height="1350" hidden></canvas>
    <div id="toast" class="toast"></div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ふたりカウント</title>
    <meta name="description" content="記念日を共有・プレゼント・記録として使えるスマホ最優先アプリ" />
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <div class="app">
      <header class="app-header card">
        <div>
          <p class="eyebrow">Shareable Anniversary Counter</p>
          <h1>ふたりカウント</h1>
        </div>
        <button id="theme-toggle" class="icon-btn" type="button" aria-label="ダークモード切替">🌙</button>
      </header>

      <section class="card hero" id="hero-card">
        <p class="eyebrow">今日のカウント</p>
        <p id="days-together" class="hero-days">--日</p>
        <p id="hero-caption" class="hero-caption">まずは記念日を登録してください。</p>
        <div class="hero-actions">
          <button id="share-main" class="btn" type="button">共有</button>
          <button id="download-main" class="btn secondary" type="button">画像保存</button>
          <button id="present-main" class="btn secondary" type="button">プレゼント表示</button>
        </div>
      </section>

      <section class="card form-card">
        <h2>記念日を追加 / 編集</h2>
        <form id="anniversary-form" class="form-grid">
          <input type="hidden" id="ann-id" />
          <label>
            タイトル
            <input id="ann-title" maxlength="40" placeholder="例: 付き合って100日" required />
          </label>
          <label>
            日付
            <input id="ann-date" type="date" required />
          </label>
          <label>
            特別メッセージ
            <textarea id="ann-message" rows="2" maxlength="120" placeholder="いつもありがとう"></textarea>
          </label>
          <label>
            テーマ
            <select id="ann-theme">
              <option value="simple">シンプル</option>
              <option value="romantic">ロマンチック</option>
              <option value="pop">ポップ</option>
            </select>
          </label>
          <p id="form-error" class="error"></p>
          <div class="form-actions">
            <button class="btn" type="submit">保存</button>
            <button id="cancel-edit" class="btn secondary" type="button">編集キャンセル</button>
          </div>
        </form>
      </section>

      <section class="card list-card">
        <div class="list-head">
          <h2>記念日カード</h2>
          <button id="sample-btn" class="btn secondary" type="button">サンプル再読込</button>
        </div>
        <div id="anniversary-list" class="anniversary-list"></div>
      </section>
    </div>

    <button id="floating-share" class="floating-share" type="button">📤 共有</button>

    <section id="present-mode" class="present-mode hidden" aria-label="カウントダウン専用表示">
      <article id="present-card" class="present-card"></article>
      <div class="present-actions">
        <button id="present-share" class="btn" type="button">共有</button>
        <button id="present-save" class="btn secondary" type="button">画像保存</button>
        <button id="present-close" class="btn secondary" type="button">閉じる</button>
      </div>
    </section>

    <canvas id="share-canvas" width="1080" height="1350" hidden></canvas>
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
  </body>
</html>

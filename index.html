<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ふたりの予定と記念日</title>
    <meta
      name="description"
      content="記念日と予定をまとめて管理し、今日の確認がすぐできるスマホ向けコンパクトWebアプリ"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header card">
        <div>
          <p class="eyebrow">Today Quick Check</p>
          <h1>ふたりメモリー</h1>
        </div>
        <p id="today-label" class="today-label">--</p>
      </header>

      <main>
        <section class="screen active" data-screen="home">
          <div id="first-guide" class="card guide hidden">
            <h2>はじめての使い方</h2>
            <p>まずは設定で名前と付き合った日を登録し、追加タブから記念日や予定を1件入れてみましょう。</p>
            <button id="close-guide" class="btn btn-secondary" type="button">わかった</button>
          </div>

          <div class="card home-grid">
            <article class="stat">
              <p class="stat-label">付き合ってから</p>
              <p class="stat-value" id="days-together">--日</p>
            </article>
            <article class="stat">
              <p class="stat-label">次の月記念日</p>
              <p class="stat-value small" id="next-monthly">あと--日</p>
            </article>
            <article class="stat">
              <p class="stat-label">次の年記念日</p>
              <p class="stat-value small" id="next-yearly">あと--日</p>
            </article>
          </div>

          <div class="card" id="next-event-card"></div>

          <div class="card">
            <p class="eyebrow">今日のひとこと</p>
            <p id="daily-message" class="daily-message">--</p>
          </div>

          <div class="card">
            <p class="eyebrow">今日やること候補</p>
            <ul id="today-todos" class="todo-list"></ul>
          </div>

          <div id="home-empty" class="card empty hidden"></div>
        </section>

        <section class="screen" data-screen="list">
          <div class="card tabs">
            <button class="tab active" data-list-tab="anniversary" type="button">記念日</button>
            <button class="tab" data-list-tab="plan" type="button">予定</button>
          </div>

          <div class="card filters">
            <label class="field">
              <span>検索</span>
              <input id="search-input" type="search" placeholder="タイトル・メモ" />
            </label>
            <div class="inline-fields">
              <label class="field">
                <span>種別</span>
                <select id="type-filter"></select>
              </label>
              <label class="field">
                <span>期間</span>
                <select id="time-filter">
                  <option value="all">すべて</option>
                  <option value="future">未来</option>
                  <option value="past">過去</option>
                </select>
              </label>
              <label class="field">
                <span>並び替え</span>
                <select id="sort-filter">
                  <option value="near">近い順</option>
                  <option value="far">遠い順</option>
                  <option value="new">作成が新しい順</option>
                </select>
              </label>
            </div>
          </div>

          <div id="list-empty" class="card empty hidden"></div>
          <div id="list-container" class="list"></div>
        </section>

        <section class="screen" data-screen="add">
          <div class="card tabs">
            <button class="tab active" data-add-tab="anniversary" type="button">記念日追加</button>
            <button class="tab" data-add-tab="plan" type="button">予定追加</button>
          </div>

          <section class="card form-section" id="quick-templates"></section>

          <form id="anniversary-form" class="card form-section">
            <h2>記念日を追加</h2>
            <input type="hidden" id="anniversary-id" />
            <label class="field"><span>タイトル</span><input id="ann-title" maxlength="40" /></label>
            <p class="error" id="ann-title-error"></p>
            <label class="field"><span>日付</span><input id="ann-date" type="date" /></label>
            <p class="error" id="ann-date-error"></p>
            <label class="field"><span>種別</span><select id="ann-type"></select></label>
            <label class="field"><span>メモ</span><textarea id="ann-memo" rows="3" maxlength="220"></textarea></label>
            <div class="actions">
              <button class="btn" type="submit">保存</button>
              <button class="btn btn-secondary" id="ann-cancel" type="button">編集をやめる</button>
            </div>
          </form>

          <form id="plan-form" class="card form-section hidden">
            <h2>予定を追加</h2>
            <input type="hidden" id="plan-id" />
            <label class="field"><span>タイトル</span><input id="plan-title" maxlength="40" /></label>
            <p class="error" id="plan-title-error"></p>
            <label class="field"><span>日付</span><input id="plan-date" type="date" /></label>
            <p class="error" id="plan-date-error"></p>
            <label class="field"><span>種別</span><select id="plan-type"></select></label>
            <label class="field"><span>場所</span><input id="plan-place" maxlength="40" /></label>
            <label class="field"><span>メモ</span><textarea id="plan-memo" rows="3" maxlength="220"></textarea></label>
            <label class="checkbox"><input id="plan-ready" type="checkbox" /> 準備済みにする</label>
            <div class="actions">
              <button class="btn" type="submit">保存</button>
              <button class="btn btn-secondary" id="plan-cancel" type="button">編集をやめる</button>
            </div>
          </form>
        </section>

        <section class="screen" data-screen="settings">
          <form id="settings-form" class="card form-section">
            <h2>基本設定</h2>
            <label class="field"><span>1人目の名前</span><input id="person-one" maxlength="20" /></label>
            <label class="field"><span>2人目の名前</span><input id="person-two" maxlength="20" /></label>
            <label class="field"><span>付き合った日</span><input id="relationship-date" type="date" /></label>
            <button class="btn" type="submit">設定を保存</button>
          </form>

          <section class="card form-section">
            <h2>バックアップ / 復元</h2>
            <div class="actions">
              <button id="export-btn" class="btn btn-secondary" type="button">JSONエクスポート</button>
              <label class="btn btn-secondary file-btn">
                JSONインポート
                <input id="import-input" type="file" accept="application/json" hidden />
              </label>
            </div>
            <p id="backup-message" class="help-text"></p>
          </section>
        </section>
      </main>

      <nav class="bottom-nav">
        <button class="nav-btn active" data-nav="home" type="button">🏠<span>ホーム</span></button>
        <button class="nav-btn" data-nav="list" type="button">📋<span>一覧</span></button>
        <button class="nav-btn" data-nav="add" type="button">➕<span>追加</span></button>
        <button class="nav-btn" data-nav="settings" type="button">⚙️<span>設定</span></button>
      </nav>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>
    <dialog id="confirm-dialog" class="confirm-dialog">
      <p id="confirm-text">この操作を実行しますか？</p>
      <div class="actions">
        <button id="confirm-ok" class="btn" type="button">実行</button>
        <button id="confirm-cancel" class="btn btn-secondary" type="button">キャンセル</button>
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
